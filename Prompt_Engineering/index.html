<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Catalyst - AI</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- HEADER -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h3 class="mb-0">The Catalyst - AI</h3>
            <small class="text-muted">Prompt Engine</small>
        </div>
    </div>

    <!-- SELECTOR -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body row g-3 align-items-end">

            <div class="col-md-6">
                <label class="form-label">Select Prompt Type</label>
                <select id="promptSelector" class="form-select"></select>
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="loadSchema()">Load Form</button>
            </div>

        </div>
    </div>

    <!-- FORM -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body" id="formArea">
            <p class="text-muted">Select a prompt type to begin</p>
        </div>
    </div>

    <!-- ACTION -->
    <button class="btn btn-success w-100 mb-3" onclick="generatePrompt()">
        Generate Prompt
    </button>

    <!-- OUTPUT -->
    <div class="card mb-3 shadow-sm">
        <div class="card-header">Generated Prompt</div>
        <div class="card-body">
            <div id="output" class="mb-0"></div>
        </div>
    </div>

    <!-- HISTORY -->
    <div class="card shadow-sm">
        <div class="card-header">History</div>
        <div class="card-body" id="history"></div>
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
