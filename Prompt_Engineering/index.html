<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prompt Engine | The Catalyst - AI</title>

  <link rel="icon" type="image/png" href="../catalyst.jpg" />
  <link rel="shortcut icon" href="../catalyst.jpg">
  <link rel="apple-touch-icon" sizes="180x180" href="../catalyst_icon.jpg">
  <link rel="mask-icon" href="/catalyst.jpg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="keywords" content="Prompt Engine ">
  <meta name="description" content="Prompt Engine  - The Catalyst AI">
  <meta name="author" content="Waqar Ahmad Malik">
  <meta name="theme-color" content="#ffffff">

    <meta property="og:title" content=" The Catalyst AI">
    <meta property="og:description" content=" Prompt Engine - The Catalyst AI">
    <meta property="og:image" content="../catalyst.jpg">
    <meta property="og:url" content="index.html">

    <!-- Load Google tag library -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HH7SV7Q68Y"></script>
    <script src="../gtag.js"></script>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Form Bot -->
    <link rel="stylesheet" href="plugins/FormBot/formbot.css">
</head>

<body class="bg-light">

<div class="container py-4">

    <!-- HEADER -->
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h3 class="mb-0">The Catalyst - AI</h3>
            <small class="text-muted">Prompt Engine</small>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="row g-3">

        <!-- SELECTOR -->
        <div class="col-lg-12">            
            <div class="card mb-3 shadow-sm">
                <div class="card-header">Select Prompt Type</div>
                <div class="card-body row g-3 align-items-end">
                    <div class="col-md-12 d-flex align-items-center gap-3">
                        <select id="promptSelector" class="form-select" onchange="loadSchema()">
                            <option value="" selected disabled>Select prompt type...</option>
                        </select>                     
                      <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="modeToggle" id="formMode" title="Form" checked >
                        <label class="btn btn-outline-primary d-flex align-items-center gap-2" for="formMode">
                          <i class="bi bi-ui-checks-grid"></i>
                        </label>
                    
                        <input type="radio" class="btn-check" name="modeToggle" id="chatMode" title="Chat Bot">
                        <label class="btn btn-outline-primary d-flex align-items-center gap-2"   for="chatMode">
                          <i class="bi bi-chat-dots"></i>
                        </label>
                      </div>                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Prompt Body -->
    <div id="prompt-body" class="d-none">
        <div class="row g-3">        
            <!-- LEFT SIDE: PROMPT ENGINE -->
            <div class="col-lg-6">           
                <!-- BOT -->
                <div id="chatView" class="card mb-3 shadow-sm h-500">
                    <div id="chat-form"></div>
                </div>
                
                <!-- FORM -->
                <div id="formView" class="card mb-3 shadow-sm h-500">
                    <div class="card-header">Tailor your Prompt</div>
                    <div class="card-body overflow-auto" id="formArea" style="height: 60vh;">
                        <p class="text-muted">Select a prompt type to begin</p>
                    </div>
                    
                    <!-- ACTION -->
                    <div class="card-footer">
                        <button class="btn btn-primary w-100" onclick="generatePrompt()">
                            Generate Prompt
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE: HISTORY -->
            <div class="col-lg-6">    
                <!-- OUTPUT -->
                <div class="card mb-3 shadow-sm h-200">
                    <div class="card-header">Generated Prompt</div>
                    <div class="card-body overflow-auto" style="height: 70vh; max-height: 70vh;">
                        <div id="alertContainer"></div>
                        <div id="output" class="mb-0"></div>
                    </div>
                </div>
            </div>
        </div>
    
        <!-- MAIN LAYOUT -->
        <div class="row g-3">
            
            <!-- Footer -->
            <div class="col-lg-12">
                
                <!-- HISTORY -->
                <div class="card mb-3 shadow-sm h-500">
                    <div class="card-header">History</div>
                    <div class="card-body overflow-auto" id="history" style="max-height: 50vh;"></div>
                </div>
                
            </div>
        </div>
    </div>
    
      <!-- Footer -->
      <footer class="text-white text-center py-3 mt-auto text-muted">
        <small>Designed & conceptualized by <a href="https://www.linkedin.com/in/waqarahmadmalik/"> Waqar Ahmad Malik </a> .</small>
      </footer>
</body>
</html>
    
<!-- App -->
    <script type="module" src="app.js"></script>
<!-- Form Bot -->
    <script src="plugins/FormBot/formbot.js"></script>
